name: Android Build Artifact

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: android-build-artifact-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  JAVA_VERSION: "17"
  BUILD_PROFILE: "production"
  ARTIFACTS_DIRECTORY: "artifacts"

jobs:
  build-android-artifact:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.16.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile --prefer-offline

      - name: Build Android app bundle locally
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EAS_LOCAL_BUILD_ARTIFACTS_DIR: ${{ github.workspace }}/${{ env.ARTIFACTS_DIRECTORY }}
        run: npx eas-cli build --platform android --profile ${{ env.BUILD_PROFILE }} --local --non-interactive

      - name: Resolve app bundle path
        id: aab
        shell: bash
        run: |
          set -euo pipefail
          APP_BUNDLE_PATH="$(find "${ARTIFACTS_DIRECTORY}" -type f -name '*.aab' | head -n 1)"
          if [ -z "${APP_BUNDLE_PATH}" ]; then
            echo "AAB not found in ${ARTIFACTS_DIRECTORY}" >&2
            exit 1
          fi

          echo "path=${APP_BUNDLE_PATH}" >> "${GITHUB_OUTPUT}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-internal-testing-aab
          path: ${{ steps.aab.outputs.path }}
          if-no-files-found: error
