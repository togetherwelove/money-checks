<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>MoneyChecks</title>
    <meta
      name="description"
      content="MoneyChecks is a mobile-first ledger app for personal and shared household bookkeeping."
    />
    <meta name="theme-color" content="#235347" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="MoneyChecks" />
    <link rel="manifest" href="./manifest.json" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <style id="expo-reset">
      html,
      body {
        height: 100%;
      }

      body {
        overflow: hidden;
      }

      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }
    </style>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", async () => {
          try {
            const serviceWorkerUrl = "./sw.js";
            const serviceWorkerResponse = await fetch(serviceWorkerUrl, {
              method: "HEAD",
              cache: "no-store",
            });
            if (!serviceWorkerResponse.ok) {
              return;
            }

            await navigator.serviceWorker.register(serviceWorkerUrl);
          } catch (error) {
            console.info("Service worker registration skipped.", error);
          }
        });
      }
    </script>
  </head>
  <body>
    <noscript>JavaScript is required to use MoneyChecks.</noscript>
    <div id="root"></div>
  </body>
</html>
