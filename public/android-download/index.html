<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>알뜰 안드로이드 테스트 빌드</title>
    <meta
      name="description"
      content="알뜰 안드로이드 테스트 APK를 내려받을 수 있는 공식 다운로드 페이지입니다."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="page-card">
        <p class="eyebrow">Android Preview</p>
        <h1 class="page-title" data-role="title">알뜰 안드로이드 테스트 빌드</h1>
        <p class="page-description" data-role="description">
          최신 Android APK를 바로 내려받아 태블릿과 휴대폰에서 테스트할 수 있습니다.
        </p>

        <div class="status-chip" data-role="status" data-variant="loading">
          최신 빌드 정보를 불러오는 중입니다.
        </div>

        <div class="actions">
          <a class="primary-button" data-role="primary-download" hidden href="#"></a>
          <a
            class="secondary-button"
            data-role="manual-download"
            href="https://github.com/togetherwelove/money-checks/releases"
            rel="noreferrer"
            target="_blank"
          ></a>
          <button class="ghost-button" data-role="retry" type="button"></button>
        </div>

        <div class="empty-state" data-role="empty-state">
          <p>최신 빌드가 아직 배포되지 않았거나, 릴리스를 불러오는 중 문제가 발생했습니다.</p>
        </div>

        <div class="info-grid" data-role="info-grid" hidden>
          <article class="info-card">
            <span class="info-label" data-role="version-label">릴리스</span>
            <div class="info-value" data-role="version">-</div>
          </article>
          <article class="info-card">
            <span class="info-label" data-role="published-at-label">업로드 시각</span>
            <div class="info-value" data-role="published-at">-</div>
          </article>
          <article class="info-card">
            <span class="info-label" data-role="file-size-label">파일 크기</span>
            <div class="info-value" data-role="file-size">-</div>
          </article>
        </div>

        <div class="detail-grid">
          <article class="notes-card">
            <h2 class="section-title" data-role="notes-label">빌드 메모</h2>
            <p class="notes-body" data-role="notes">-</p>
          </article>
          <article class="guide-card">
            <h2 class="section-title" data-role="install-guide-label">설치 방법</h2>
            <ol class="guide-list" data-role="install-steps"></ol>
          </article>
        </div>
      </section>
    </main>

    <script src="./config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
